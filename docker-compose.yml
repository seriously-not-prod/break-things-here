services:
  db:
    image: postgres:16-alpine
    container_name: festival-db
    environment:
      POSTGRES_DB: festival_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d festival_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  db-test:
    image: postgres:16-alpine
    container_name: festival-db-test
    environment:
      POSTGRES_DB: festival_planner_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${TEST_DB_PORT:-5433}:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d festival_planner_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: festival-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend/src:/app/src
      - uploads-data:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/festival_planner
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CSRF_SECRET=${CSRF_SECRET:-38a6e2426c2168dd83a4ab321467479d2141463f9c610487e4bf9b82af66cec7}
      - SESSION_TIMEOUT_MS=${SESSION_TIMEOUT_MS:-1800000}
      - TOKEN_HASH_SECRET=${TOKEN_HASH_SECRET:-change-this-token-hash-secret}
      - REFRESH_TOKEN_ENC_KEY=${REFRESH_TOKEN_ENC_KEY:-3Ipit2WZgUvcC+hCaaEQsfHCR852VBFimoyoob8r22A=}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@festivalplanner.local}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-8081},http://localhost}
      - ENTRA_AUTH_ENABLED=${ENTRA_AUTH_ENABLED:-false}
      - ENTRA_MFA_REQUIRED=${ENTRA_MFA_REQUIRED:-false}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_AUTHORITY=${AZURE_AUTHORITY:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_REDIRECT_URI=${AZURE_REDIRECT_URI:-http://localhost:8081/auth/callback}
      - ENTRA_GROUP_ADMINS=${ENTRA_GROUP_ADMINS:-}
      - ENTRA_GROUP_ORGANIZERS=${ENTRA_GROUP_ORGANIZERS:-}
      - ENTRA_GROUP_COLLABORATORS=${ENTRA_GROUP_COLLABORATORS:-}
      - ENTRA_GROUP_GUESTS=${ENTRA_GROUP_GUESTS:-}
      - ENTRA_GROUP_VIEWERS=${ENTRA_GROUP_VIEWERS:-}
      - RLS_PILOT_ENABLED=${RLS_PILOT_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=
        - VITE_SESSION_TIMEOUT_MS=${SESSION_TIMEOUT_MS:-1800000}
    container_name: festival-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
    name: festival-postgres-data
  postgres-test-data:
    name: festival-postgres-test-data
  uploads-data:
    name: festival-uploads-data

networks:
  app-network:
    name: festival-network
    driver: bridge
