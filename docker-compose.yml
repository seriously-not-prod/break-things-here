services:
  db:
    image: postgres:16-alpine
    container_name: festival-db
    environment:
      POSTGRES_DB: festival_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d festival_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  db-test:
    image: postgres:16-alpine
    container_name: festival-db-test
    environment:
      POSTGRES_DB: festival_planner_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}
    ports:
      - "${TEST_DB_PORT:-5433}:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d festival_planner_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: festival-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend/src:/app/src
      - uploads-data:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}@db:5432/festival_planner
      # Secrets must be provided via .env (or your secrets manager). No
      # ${VAR:-default} fallbacks — those bake credentials into the committed
      # file and bypass the backend's "missing secret" startup check (#702).
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env (see .env.example)}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CSRF_SECRET=${CSRF_SECRET:?CSRF_SECRET must be set in .env (see .env.example)}
      - SESSION_TIMEOUT_MS=${SESSION_TIMEOUT_MS:-1800000}
      - TOKEN_HASH_SECRET=${TOKEN_HASH_SECRET:?TOKEN_HASH_SECRET must be set in .env (see .env.example)}
      - REFRESH_TOKEN_ENC_KEY=${REFRESH_TOKEN_ENC_KEY:?REFRESH_TOKEN_ENC_KEY must be set in .env (see .env.example)}
      - EMAIL_WEBHOOK_SECRET=${EMAIL_WEBHOOK_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@festivalplanner.local}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-8081},http://localhost}
      - ENTRA_AUTH_ENABLED=${ENTRA_AUTH_ENABLED:-true}
      - ENTRA_MFA_REQUIRED=${ENTRA_MFA_REQUIRED:-true}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_AUTHORITY=${AZURE_AUTHORITY:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_REDIRECT_URI=${AZURE_REDIRECT_URI:-http://localhost:8081/auth/callback}
      - ENTRA_GROUP_ADMINS=${ENTRA_GROUP_ADMINS:-}
      - ENTRA_GROUP_ORGANIZERS=${ENTRA_GROUP_ORGANIZERS:-}
      - ENTRA_GROUP_COLLABORATORS=${ENTRA_GROUP_COLLABORATORS:-}
      - ENTRA_GROUP_GUESTS=${ENTRA_GROUP_GUESTS:-}
      - ENTRA_GROUP_VIEWERS=${ENTRA_GROUP_VIEWERS:-}
      - RLS_PILOT_ENABLED=${RLS_PILOT_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=
        - VITE_SESSION_TIMEOUT_MS=${SESSION_TIMEOUT_MS:-1800000}
    container_name: festival-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # PostgREST — auto-generated RESTful API from the PostgreSQL schema (TRD v1.0)
  # Exposes the database schema as a REST API on port 3001.
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: festival-postgrest
    ports:
      - "${POSTGREST_PORT:-3001}:3000"
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}@db:5432/festival_planner
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: ${PGRST_ANON_ROLE:-web_anon}
      PGRST_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (see .env.example)}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_LOG_LEVEL: ${PGRST_LOG_LEVEL:-info}
      PGRST_OPENAPI_MODE: follow-privileges
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  # Automated database backup — daily full + hourly incremental (NFR reliability)
  db-backup:
    image: postgres:16-alpine
    container_name: festival-db-backup
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (see .env.example)}
    volumes:
      - db-backups:/backups
    entrypoint: >
      sh -c "
        apk add --no-cache dcron &&
        echo '0 * * * * pg_dump -h db -U postgres festival_planner | gzip > /backups/hourly_$$(date +\\%Y\\%m\\%d_\\%H\\%M\\%S).sql.gz' > /etc/crontabs/root &&
        echo '0 2 * * * pg_dump -h db -U postgres festival_planner | gzip > /backups/daily_$$(date +\\%Y\\%m\\%d).sql.gz' >> /etc/crontabs/root &&
        echo '0 3 * * 0 find /backups -name \\''hourly_*\\'' -mtime +14 -delete' >> /etc/crontabs/root &&
        echo '0 4 * * 0 find /backups -name \\''daily_*\\'' -mtime +30 -delete' >> /etc/crontabs/root &&
        crond -f
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
    name: festival-postgres-data
  postgres-test-data:
    name: festival-postgres-test-data
  uploads-data:
    name: festival-uploads-data
  db-backups:
    name: festival-db-backups

networks:
  app-network:
    name: festival-network
    driver: bridge
