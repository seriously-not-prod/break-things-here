services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: festival-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend/src:/app/src
      - sqlite-data:/app/database
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=/app/database/dev.sqlite
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - SESSION_TIMEOUT_MS=${SESSION_TIMEOUT_MS:-1800000}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@festivalplanner.local}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=http://localhost:${FRONTEND_PORT:-3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: festival-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-4000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  sqlite-data:
    name: festival-sqlite-data

networks:
  app-network:
    driver: bridge
  app-network:
    name: festival-network
    driver: bridge
