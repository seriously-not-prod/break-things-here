services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: festival-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:${BACKEND_PORT:-4000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: festival-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_HOST=database
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-festival_planner}
      - DATABASE_USER=${POSTGRES_USER:-festival_user}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_local_env}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    container_name: festival-database
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-festival_planner}
      - POSTGRES_USER=${POSTGRES_USER:-festival_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_local_env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-festival_user} -d ${POSTGRES_DB:-festival_planner}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
    name: festival-postgres-data

networks:
  app-network:
    name: festival-network
    driver: bridge
