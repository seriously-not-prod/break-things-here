name: CI - Unified Pipeline

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - develop
      - test
      - stage
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - test
      - stage

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: TypeScript type check (root)
        run: npx tsc --noEmit

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript type check (backend)
        working-directory: backend
        run: npx tsc --noEmit

  test-root:
    name: Test - Root (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-root
          path: coverage/
          retention-days: 7

  test-backend:
    name: Test - Backend (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

  test-frontend:
    name: Test - Frontend (Vite)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test-root, test-backend, test-frontend]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-root, test-backend, test-frontend, build-check]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" || \
                "${{ needs.test-root.result }}" != "success" || \
                "${{ needs.test-backend.result }}" != "success" || \
                "${{ needs.test-frontend.result }}" != "success" || \
                "${{ needs.build-check.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI checks passed"

