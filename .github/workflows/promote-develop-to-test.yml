name: Promote develop → test

on:
  workflow_dispatch: {}
  push:
    branches: [develop]

jobs:
  create-sync-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Create sync branch from test and merge develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git fetch origin develop test

          SYNC_BRANCH="bugfix/190-sync-develop-to-test"

          # Delete existing sync branch remotely if present
          git push origin --delete "${SYNC_BRANCH}" 2>/dev/null || true

          # Create sync branch from test
          git checkout -b "${SYNC_BRANCH}" origin/test

          # Merge develop, prefer develop's version for conflicts
          git merge origin/develop -X theirs \
            -m "fix: sync develop into test resolving conflicts #190" \
            --allow-unrelated-histories || true

          # Remove Next.js incompatible files if present
          if [ -d "src/app" ]; then
            git rm -r src/app/
            git commit --amend --no-edit
          fi

          # Push sync branch
          git push origin "${SYNC_BRANCH}"

          # Close any existing open PR for this sync branch → test
          EXISTING=$(gh pr list \
            --repo "${REPO}" \
            --head "${SYNC_BRANCH}" \
            --base test \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr close "$EXISTING" \
              --comment "Superseded by new sync PR from workflow dispatch." 2>/dev/null || true
          fi

          # Create PR from sync branch → test
          gh pr create \
            --repo "${REPO}" \
            --head "${SYNC_BRANCH}" \
            --base test \
            --title "fix: sync develop into test resolving conflicts #190" \
            --body "Automated sync: merges develop content into test, resolving all conflicts with develop winning. Once merged, a clean develop→test promotion PR will be created. References #190"
