name: Promote develop → test

on:
  push:
    branches: [develop]

env:
  AUTO_MERGE: "true"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: create_pr
        name: Create PR to `test`
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore(release): promote develop → test
          title: chore(release): promote develop → test (automated)
          body: |-
            Automated promotion: merging `develop` into `test` for release verification.
            This PR was created by the promotion workflow.
          base: test
          head: develop
          labels: chore, automated

      - name: Optionally enable auto-merge
        if: env.AUTO_MERGE == 'true' && steps.create_pr.outputs.pull-request-number != ''
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
