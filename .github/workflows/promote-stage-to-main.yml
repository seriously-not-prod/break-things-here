name: Promote stage → main

on:
  workflow_dispatch: {}
  push:
    branches: [stage]

jobs:
  create-sync-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Create sync branch from main and merge stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git fetch origin stage main

          SYNC_BRANCH="bugfix/190-sync-stage-to-main"

          # Delete existing sync branch remotely if present
          git push origin --delete "${SYNC_BRANCH}" 2>/dev/null || true

          # Create sync branch from main
          git checkout -b "${SYNC_BRANCH}" origin/main

          # Merge stage, prefer stage's version for conflicts
          git merge origin/stage -X theirs \
            -m "fix: sync stage into main resolving conflicts #190" \
            --allow-unrelated-histories || true

          # Remove Next.js incompatible files if present
          if [ -d "src/app" ]; then
            git rm -r src/app/
            git commit --amend --no-edit
          fi

          # Push sync branch
          git push origin "${SYNC_BRANCH}"

          # Close any existing open PR for this sync branch → main
          EXISTING=$(gh pr list \
            --repo "${REPO}" \
            --head "${SYNC_BRANCH}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr close "$EXISTING" \
              --comment "Superseded by new sync PR from workflow dispatch." 2>/dev/null || true
          fi

          # Create PR from sync branch → main
          gh pr create \
            --repo "${REPO}" \
            --head "${SYNC_BRANCH}" \
            --base main \
            --title "fix: sync stage into main resolving conflicts #190" \
            --body "Automated sync: merges stage content into main, resolving all conflicts with stage winning. References #190"
