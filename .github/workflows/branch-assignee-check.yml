name: Branch Assignee Check

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - test
      - stage
      - main

permissions:
  issues: read

jobs:
  verify-assignee:
    name: Verify pusher is issue assignee
    runs-on: ubuntu-latest
    steps:
      - name: Pass automatically for promotion PRs
        if: github.event_name == 'pull_request'
        run: |
          echo "✅ Promotion PR (${{ github.head_ref }} → ${{ github.base_ref }}): assignee check not required for environment promotions."

      - name: Extract issue number from branch
        id: extract
        if: github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          # Extract issue number: feature/123-description → 123
          ISSUE_NUMBER=$(echo "$BRANCH" | sed -n 's|^[^/]*/\([0-9]*\)-.*|\1|p')

          if [[ -z "$ISSUE_NUMBER" ]]; then
            echo "::error::Could not extract issue number from branch name '$BRANCH'"
            exit 1
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Extracted issue #$ISSUE_NUMBER from branch '$BRANCH'"

      - name: Check if pusher is assigned to issue
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          PUSHER: ${{ github.actor }}
        run: |
          echo "Checking if '$PUSHER' is assigned to issue #$ISSUE_NUMBER"

          # Call GitHub API to get issue assignees and capture any errors.
          API_ERR_FILE="$(mktemp)"
          if ! ASSIGNEES=$(gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            --jq '[.assignees[].login] | join(",")' 2>"$API_ERR_FILE"); then
            API_ERROR_MSG="$(cat "$API_ERR_FILE")"
            rm -f "$API_ERR_FILE"

            if echo "$API_ERROR_MSG" | grep -qiE 'not found|404'; then
              echo "::error::Issue #$ISSUE_NUMBER could not be found or is not accessible with the provided token."
            else
              echo "::error::Failed to query issue #$ISSUE_NUMBER via GitHub API: $API_ERROR_MSG"
            fi
            exit 1
          fi
          rm -f "$API_ERR_FILE"

          if [[ -z "$ASSIGNEES" ]]; then
            echo "::error::Issue #$ISSUE_NUMBER has no assignees. Assign yourself to the issue before pushing."
            exit 1
          fi

          echo "Issue #$ISSUE_NUMBER assignees: $ASSIGNEES"

          if echo "$ASSIGNEES" | tr ',' '\n' | grep -qx "$PUSHER"; then
            echo "✅ $PUSHER is assigned to issue #$ISSUE_NUMBER"
          else
            echo "::error::$PUSHER is not assigned to issue #$ISSUE_NUMBER. Only assignees ($ASSIGNEES) can push to this branch."
            exit 1
          fi
